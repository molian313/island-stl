<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>灵动岛 - 设置</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a1a;
      color: #fff;
      min-height: 100vh;
    }

    .container {
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 200px;
      background: #111;
      border-right: 1px solid #333;
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 24px 20px;
      border-bottom: 1px solid #333;
    }

    .sidebar-header h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .sidebar-header p {
      font-size: 12px;
      color: #888;
    }

    .nav-list {
      padding: 12px 8px;
    }

    .nav-item {
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      color: #ccc;
      transition: background 0.15s, color 0.15s;
      margin-bottom: 2px;
    }

    .nav-item:hover {
      background: #2a2a2a;
      color: #fff;
    }

    .nav-item.active {
      background: #333;
      color: #fff;
    }

    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .content-header {
      padding: 24px 32px 16px;
      border-bottom: 1px solid #333;
    }

    .content-header h2 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .content-header p {
      font-size: 13px;
      color: #888;
    }

    .content-body {
      flex: 1;
      overflow-y: auto;
      padding: 24px 32px;
    }

    .page { display: none; }
    .page.active { display: block; }

    .setting-group {
      margin-bottom: 24px;
    }

    .setting-group-title {
      font-size: 12px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }

    .setting-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px;
      background: #222;
      border-radius: 10px;
      border: 1px solid #333;
      margin-bottom: 8px;
    }

    .setting-label h3 {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .setting-label p {
      font-size: 12px;
      color: #888;
    }

    .switch {
      position: relative;
      width: 44px;
      height: 24px;
      display: inline-block;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #444;
      border-radius: 24px;
      transition: background 0.2s;
    }

    .slider::before {
      content: "";
      position: absolute;
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .switch input:checked + .slider {
      background: #22c55e;
    }

    .switch input:checked + .slider::before {
      transform: translateX(20px);
    }

    .input {
      background: #333;
      border: 1px solid #444;
      border-radius: 8px;
      padding: 10px 12px;
      color: #fff;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }

    .input:focus {
      border-color: #22c55e;
    }

    .btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: background 0.15s;
    }

    .btn-primary {
      background: #22c55e;
      color: #fff;
    }

    .btn-primary:hover {
      background: #16a34a;
    }

    .btn-danger {
      background: #ef4444;
      color: #fff;
    }

    .btn-danger:hover {
      background: #dc2626;
    }

    .printer-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: #2a2a2a;
      border-radius: 8px;
      border: 1px solid #333;
    }

    .printer-item-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .printer-item-name {
      font-size: 14px;
      font-weight: 500;
    }

    .printer-item-ip {
      font-size: 12px;
      color: #888;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }

    .footer {
      padding: 16px 32px;
      border-top: 1px solid #333;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .save-btn {
      background: #22c55e;
      color: white;
      border: none;
      padding: 10px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    .save-btn:hover {
      background: #16a34a;
    }

    .status {
      font-size: 13px;
      color: #22c55e;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .status.show {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="container">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1>灵动岛</h1>
        <p>设置</p>
      </div>
      <nav class="nav-list">
        <div class="nav-item active" data-page="general">常规设置</div>
        <div class="nav-item" data-page="printer">打印机</div>
      </nav>
    </aside>

    <div class="content">
      <header class="content-header">
        <h2 id="page-title">常规设置</h2>
        <p id="page-desc">配置系统选项。</p>
      </header>

      <div class="content-body">
        <div class="page active" id="page-general">
          <div class="setting-group">
            <div class="setting-group-title">系统</div>
            <div class="setting-item">
              <div class="setting-label">
                <h3>开机自启</h3>
                <p>Windows 启动时自动运行灵动岛。</p>
              </div>
              <div class="setting-control">
                <label class="switch">
                  <input type="checkbox" id="auto-start-toggle" />
                  <span class="slider"></span>
                </label>
              </div>
            </div>
            <div class="setting-item">
              <div class="setting-label">
                <h3>调试模式</h3>
                <p>在灵动岛左侧显示展开/收起按钮，方便调试界面。</p>
              </div>
              <div class="setting-control">
                <label class="switch">
                  <input type="checkbox" id="debug-toggle" />
                  <span class="slider"></span>
                </label>
              </div>
            </div>
          </div>
        </div>

        <div class="page" id="page-printer">
          <div class="setting-group">
            <div class="setting-group-title">打印机列表</div>
            <div id="printer-list" style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px;"></div>
            <div class="form-grid">
              <input id="pcfg-name" class="input" type="text" placeholder="名称（如：2号）" />
              <input id="pcfg-ip" class="input" type="text" placeholder="IP 地址" />
              <input id="pcfg-access" class="input" type="text" placeholder="访问码" />
              <input id="pcfg-serial" class="input" type="text" placeholder="序列号" />
            </div>
            <div style="display:flex;gap:8px;">
              <button id="pcfg-add" class="btn btn-primary">添加</button>
              <button id="pcfg-save" class="btn btn-primary">保存配置</button>
            </div>
          </div>
        </div>
      </div>

      <footer class="footer">
        <button id="save-btn" class="save-btn" type="button">保存设置</button>
        <div id="status" class="status">已保存</div>
      </footer>
    </div>
  </div>

  <script type="module">
    import { invoke } from "@tauri-apps/api/core";

    // Page navigation
    const navItems = document.querySelectorAll(".nav-item");
    const pages = document.querySelectorAll(".page");
    const pageTitle = document.getElementById("page-title");
    const pageDesc = document.getElementById("page-desc");

    const pageInfo = {
      general: { title: "常规设置", desc: "配置系统选项。" },
      printer: { title: "打印机", desc: "管理 Bambu Lab 打印机连接配置。" },
    };

    function navigateTo(pageId) {
      navItems.forEach(n => n.classList.remove("active"));
      document.querySelector(`.nav-item[data-page="${pageId}"]`)?.classList.add("active");
      pages.forEach(p => p.classList.remove("active"));
      document.getElementById(`page-${pageId}`)?.classList.add("active");
      const info = pageInfo[pageId];
      if (info) {
        if (pageTitle) pageTitle.textContent = info.title;
        if (pageDesc) pageDesc.textContent = info.desc;
      }
    }

    navItems.forEach(item => {
      item.addEventListener("click", () => navigateTo(item.dataset.page ?? ""));
    });

    // Auto-start
    const autoStartToggle = document.getElementById("auto-start-toggle");

    async function loadSettings() {
      try {
        const autoStart = await invoke("get_auto_start");
        autoStartToggle.checked = autoStart;
      } catch (e) {
        console.error("[Settings]", e);
      }
    }

    autoStartToggle.addEventListener("change", async () => {
      try {
        await invoke("set_auto_start", { enabled: autoStartToggle.checked });
      } catch (e) {
        console.error("[Settings]", e);
      }
    });

    // Printer configs
    const printerList = document.getElementById("printer-list");
    const pcfgName = document.getElementById("pcfg-name");
    const pcfgIp = document.getElementById("pcfg-ip");
    const pcfgAccess = document.getElementById("pcfg-access");
    const pcfgSerial = document.getElementById("pcfg-serial");
    const pcfgAdd = document.getElementById("pcfg-add");
    const pcfgSave = document.getElementById("pcfg-save");

    let printerConfigs = [];

    function renderPrinterList() {
      printerList.innerHTML = "";
      printerConfigs.forEach((cfg, i) => {
        const el = document.createElement("div");
        el.className = "printer-item";
        el.innerHTML = `
          <div class="printer-item-info">
            <div class="printer-item-name">${cfg.name}</div>
            <div class="printer-item-ip">${cfg.ip_address}</div>
          </div>
          <button class="btn btn-danger" data-index="${i}">删除</button>
        `;
        el.querySelector("button")?.addEventListener("click", () => {
          printerConfigs.splice(i, 1);
          renderPrinterList();
        });
        printerList.appendChild(el);
      });
    }

    pcfgAdd.addEventListener("click", () => {
      const name = pcfgName.value.trim();
      const ip = pcfgIp.value.trim();
      const access = pcfgAccess.value.trim();
      const serial = pcfgSerial.value.trim();
      if (!name || !ip || !access || !serial) return;
      printerConfigs.push({ name, ip_address: ip, access_code: access, serial: serial });
      renderPrinterList();
      pcfgName.value = "";
      pcfgIp.value = "";
      pcfgAccess.value = "";
      pcfgSerial.value = "";
    });

    pcfgSave.addEventListener("click", async () => {
      try {
        await invoke("set_printer_configs", { configs: printerConfigs });
        showStatus("打印机配置已保存");
      } catch (e) {
        console.error("[Printer]", e);
      }
    });

    async function loadPrinterConfigs() {
      try {
        printerConfigs = await invoke("get_printer_configs");
        renderPrinterList();
      } catch (e) {
        console.error("[Printer]", e);
      }
    }

    // Save button
    const saveBtn = document.getElementById("save-btn");
    const statusEl = document.getElementById("status");

    function showStatus(msg) {
      statusEl.textContent = msg;
      statusEl.classList.add("show");
      setTimeout(() => statusEl.classList.remove("show"), 2000);
    }

    saveBtn.addEventListener("click", async () => {
      try {
        await invoke("set_auto_start", { enabled: autoStartToggle.checked });
        showStatus("已保存");
      } catch (e) {
        console.error("[Settings]", e);
      }
    });

    // Debug mode
    const debugToggle = document.getElementById("debug-toggle");

    async function loadDebugMode() {
      try {
        const enabled = await invoke("get_debug_mode");
        debugToggle.checked = enabled;
      } catch (e) {
        console.error("[Settings]", e);
      }
    }

    async function updateDebugButton() {
      try {
        await invoke("set_debug_mode", { enabled: debugToggle.checked });
      } catch (e) {
        console.error("[Settings]", e);
      }
    }

    debugToggle.addEventListener("change", updateDebugButton);

    // Init
    loadSettings();
    loadPrinterConfigs();
    loadDebugMode();
  </script>
</body>
</html>
